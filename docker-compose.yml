version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: exam_system_db
    environment:
      - POSTGRES_USER=exam
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-exam}
      - POSTGRES_DB=exam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam_system_backend
    ports:
      - "8000:8000"
    environment:
      - TZ=Europe/Moscow
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=postgresql://exam:${POSTGRES_PASSWORD:-exam}@db:5432/exam
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=${DEBUG:-True}
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exam_system_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
  postgres_data:

