services:
  db:
    image: postgres:16-alpine
    container_name: exam_system_db_dev
    environment:
      - POSTGRES_USER=exam
      - POSTGRES_PASSWORD=exam
      - POSTGRES_DB=exam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exam -d exam"]
      interval: 3s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: exam_system_backend_dev
    ports:
      - "8000:8000"
    environment:
      - TZ=Europe/Moscow
      - GIGACHAT_CREDENTIALS=${GIGACHAT_CREDENTIALS:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - DATABASE_URL=postgresql://exam:exam@db:5432/exam
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-in-production}
      - DEBUG=True
      - SEED_TEST_ENV=true
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://localhost
    volumes:
      - .:/app
      - backend_data:/app/backend/data
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # Только «процесс отвечает»; LLM при этом не вызывается (см. поле llm в JSON /api/health)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 30
      # Первый старт может долго грузить ML-зависимости до bind порта
      start_period: 300s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: exam_system_frontend_dev
    ports:
      - "3000:3000"
    environment:
      # Запросы с браузера идут на тот же хост:порт, что и Vite; Vite проксирует /api → backend
      - VITE_API_BASE_URL=/api
      - DOCKER_BACKEND_PROXY=http://backend:8000
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
  postgres_data:

